# daemon.conf — TieJia v2.0.0 Daemon Manager process manifest
# ============================================================================
# Each [section] defines a daemon. Fields:
#   cmd      = executable path (supports ${MODDIR}, ${ABI})
#   args     = command-line arguments (space-separated, supports ${VAR})
#   delay    = seconds to wait before launching (default 0)
#   priority = lower = earlier (default 50)
#   restart  = auto-restart on death? (true/false, default true)
#   depends  = name of prerequisite daemon (must launch first; optional)
#
# Priority groups:
#   10-19: TEE core (supervisor, boot hash)
#   20-29: Early daemons (aswatcher)
#   30-39: Mid daemons (proc obfuscation, mount isolation)
#   40-49: Late daemons (prop unify)
# ============================================================================

[supervisor]
cmd=${MODDIR}/supervisor
args=${MODDIR}/daemon ${MODDIR}
priority=10
restart=true

[boot_hash]
cmd=/system/bin/sh
args=${MODDIR}/boot_hash.sh
priority=20
restart=false

[aswatcher]
cmd=${MODDIR}/bin/${ABI}/aswatcher
delay=5
depends=supervisor
priority=25
restart=true

[proc_obfuscate]
cmd=/system/bin/sh
args=${MODDIR}/proc_obfuscate.sh
delay=10
priority=30
restart=true

[mount_isolation]
cmd=/system/bin/sh
args=${MODDIR}/mount_isolation.sh
delay=30
priority=35
restart=true

[prop_unify]
cmd=/system/bin/sh
args=${MODDIR}/prop_unify.sh
delay=40
priority=40
restart=false
